<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sysd_ui</title>
<style>
:root {
  --bg:       #0f0f1a;
  --panel:    #15151f;
  --panel2:   #1a1a2e;
  --border:   rgba(76,201,240,.15);
  --accent:   #4cc9f0;
  --text:     #cdd6f4;
  --muted:    #6c7086;
  --active:   #a6e3a1;
  --failed:   #f38ba8;
  --warning:  #f9e2af;
  --inactive: #585b70;
  --star:     #f9e2af;
  --radius:   8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); }
[hidden] { display: none !important; }

#app { display: flex; flex-direction: column; height: 100vh; }
header { display: flex; align-items: center; gap: 10px; padding: 9px 16px; flex-shrink: 0; background: var(--panel2); border-bottom: 1px solid var(--border); }
.logo { font-weight: 700; font-size: 1.1em; color: var(--accent); letter-spacing: .03em; white-space: nowrap; }
#layout { display: flex; flex: 1; overflow: hidden; }

/* sidebar */
#sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; overflow: hidden; }
#sidebar-controls { padding: 8px 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
#class-filter { display: flex; gap: 4px; flex-wrap: wrap; }
.chip { padding: 3px 9px; border-radius: 20px; font-size: .75em; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; }
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: rgba(76,201,240,.15); border-color: rgba(76,201,240,.4); color: var(--accent); }
#new-btn { padding: 5px; background: rgba(76,201,240,.07); border: 1px dashed rgba(76,201,240,.3); border-radius: 6px; color: var(--accent); font-size: .82em; cursor: pointer; }
#new-btn:hover { background: rgba(76,201,240,.15); }
#svc-list { list-style: none; flex: 1; overflow-y: auto; }
#svc-list li { padding: 9px 12px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
#svc-list li:hover { background: rgba(76,201,240,.06); }
#svc-list li.sel { background: rgba(76,201,240,.13); }
.svc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--inactive); }
.svc-dot.active { background: var(--active); }
.svc-dot.failed { background: var(--failed); }
.svc-info { flex: 1; overflow: hidden; }
.svc-name  { font-size: .88em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.svc-class { font-size: .72em; color: var(--muted); }
.star-btn  { background: none; border: none; font-size: 1em; cursor: pointer; padding: 0 2px; color: var(--muted); flex-shrink: 0; }
.star-btn.on, .star-btn:hover { color: var(--star); }

/* detail */
#detail { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
#empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 1.1em; }
#detail-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#detail-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 20px 12px; border-bottom: 1px solid var(--border); background: var(--panel); gap: 12px; flex-shrink: 0; }
#d-name { font-size: 1.2em; font-weight: 700; }
#d-desc { font-size: .85em; color: var(--muted); margin-top: 2px; }
.badge { padding: 3px 10px; border-radius: 20px; font-size: .8em; font-weight: 600; flex-shrink: 0; margin-top: 4px; }
.badge.active   { background: rgba(166,227,161,.15); color: var(--active); }
.badge.failed   { background: rgba(243,139,168,.15); color: var(--failed); }
.badge.inactive { background: rgba(88,91,112,.15);   color: var(--inactive); }
#d-actions { display: flex; gap: 8px; flex-wrap: wrap; padding: 11px 20px; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; }

/* tabs */
#tabs { display: flex; gap: 2px; padding: 10px 20px 0; border-bottom: 1px solid var(--border); background: var(--panel2); flex-shrink: 0; }
.tab { padding: 7px 16px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font-size: .9em; }
.tab:hover  { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
#tab-panels { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* panels */
.panel { display: none; }
.panel.active { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
#panel-info.active, #panel-journal.active { padding: 20px; }

/* info */
#d-meta { width: 100%; border-collapse: collapse; max-width: 640px; }
#d-meta td { padding: 5px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
#d-meta td:first-child { color: var(--muted); width: 120px; font-size: .85em; }
#d-deps { margin-top: 16px; }
#d-deps h4 { color: var(--muted); font-size: .78em; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.dep-row { display: flex; gap: 10px; align-items: center; padding: 3px 0; font-size: .87em; }
.dep-badge { font-size: .73em; padding: 1px 6px; border-radius: 10px; background: rgba(166,227,161,.1); color: var(--active); }
.dep-badge.warn { background: rgba(249,226,175,.1); color: var(--warning); }

/* journal */
#d-journal { list-style: none; font-family: monospace; font-size: .85em; }
#d-journal li { display: flex; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.jtime { color: var(--muted); white-space: nowrap; min-width: 110px; }

/* editor panel */
#panel-editor.active { overflow: hidden; }
#editor-scroll { flex: 1; overflow-y: auto; padding: 16px 20px 0; }
#d-required-by { margin-bottom: 12px; padding: 8px 12px; border-radius: 6px; background: rgba(249,226,175,.08); border: 1px solid rgba(249,226,175,.25); color: var(--warning); font-size: .84em; }
#editor-footer { display: flex; align-items: center; gap: 8px; padding: 11px 20px; border-top: 1px solid var(--border); background: var(--panel); flex-shrink: 0; flex-wrap: wrap; }
#save-status { font-size: .84em; }
#save-status.ok  { color: var(--active); }
#save-status.err { color: var(--failed); }
#editor-state { font-size: .82em; margin-left: auto; white-space: nowrap; }
#editor-state.clean { color: var(--active); }
#editor-state.dirty { color: var(--warning); }

/* editor sections */
.section-block { margin-bottom: 14px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.section-title { display: flex; align-items: center; gap: 8px; padding: 8px 14px; font-size: .82em; font-weight: 600; letter-spacing: .04em; color: var(--accent); background: rgba(76,201,240,.06); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
.section-title:hover { background: rgba(76,201,240,.1); }
.fold-arrow { font-size: .9em; width: 12px; display: inline-block; transition: transform .15s; }
.section-body.collapsed { display: none; }
.section-title.collapsed .fold-arrow { transform: rotate(-90deg); }
.field-row { display: flex; align-items: center; gap: 10px; padding: 7px 14px; border-bottom: 1px solid var(--border); }
.field-row:last-child { border-bottom: none; }
.field-label { width: 160px; flex-shrink: 0; font-size: .85em; color: var(--muted); font-style: italic; }
.field-label.common { color: var(--accent); }   /* mirrors GTK .common-label */
.field-input.err, .key-input.err { border-color: rgba(243,139,168,.75) !important; box-shadow: 0 0 0 1px rgba(243,139,168,.25); }
.field-hint { font-size: .77em; margin-top: 2px; }
.field-hint.err  { color: var(--failed); }
.field-hint.warn { color: var(--warning); }
.field-hint.ok   { color: var(--muted); }
.field-input, .key-input { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 5px; padding: 5px 8px; color: var(--text); font-size: .87em; font-family: monospace; }
textarea.field-input { line-height: 1.5; min-height: 32px; }
.field-input { flex: 1; }
.field-input:focus, .key-input:focus { outline: none; border-color: var(--accent); }
.field-input.drop-target { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(76,201,240,.3); }
.browse-btn { padding: 4px 8px; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-size: .85em; flex-shrink: 0; cursor: pointer; }
.browse-btn:hover { border-color: var(--accent); color: var(--accent); }
.browse-btn { padding: 4px 8px; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-size: .85em; flex-shrink: 0; cursor: pointer; }
.browse-btn:hover { border-color: var(--accent); color: var(--accent); }
.key-input { width: 155px; flex-shrink: 0; }
.add-row-btn { margin: 7px 14px; padding: 4px 10px; background: none; border: 1px dashed var(--border); color: var(--muted); font-size: .79em; border-radius: 5px; cursor: pointer; }
.add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
.remove-row { padding: 2px 7px; font-size: .85em; background: rgba(243,139,168,.08); border: 1px solid rgba(243,139,168,.2); color: var(--failed); border-radius: 5px; cursor: pointer; flex-shrink: 0; }
.remove-row:hover { background: rgba(243,139,168,.18); }

/* list section headers */
.list-section-header { padding: 5px 12px 3px; font-size: .68em; letter-spacing: .08em; color: var(--muted); background: var(--panel2); border-bottom: 1px solid var(--border); cursor: default; pointer-events: none; }

/* environment editor — outer wrapper */
.env-editor-wrapper { padding: 0; border-bottom: 1px solid var(--border); align-items: flex-start; gap: 0; }
.env-field-label { width: 160px; flex-shrink: 0; padding: 10px 14px; font-size: .85em; color: var(--muted); font-style: italic; }

/* foldable sub-sections */
.env-fold-block { border: 1px solid var(--border); border-radius: 5px; margin: 6px 10px 6px 0; overflow: hidden; }
.env-path-block { margin-left: 20px; }
.env-fold-header { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: rgba(76,201,240,.04); cursor: pointer; user-select: none; font-size: .83em; color: var(--accent); }
.env-fold-header:hover { background: rgba(76,201,240,.09); }
.env-fold-title { font-weight: 600; letter-spacing: .03em; }
.env-fold-body { padding: 0; }
.env-fold-body.collapsed { display: none; }
.env-fold-body .fold-arrow { transition: transform .15s; }

/* env key=value rows */
.env-kv-row { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-top: 1px solid var(--border); }
.env-eq { color: var(--muted); flex-shrink: 0; font-family: monospace; }
.env-key { width: 150px; flex-shrink: 0; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 5px; padding: 4px 7px; color: var(--text); font-size: .87em; font-family: monospace; }
.env-key:focus { outline: none; border-color: var(--accent); }

/* path entries */
.env-path-entry { padding: 4px 10px; border-top: 1px solid var(--border); }
.env-path-row { display: flex; align-items: center; gap: 6px; }
.path-hint { font-size: .76em; padding: 1px 0 3px; }
.path-hint-ok   { color: var(--muted); }
.path-hint-warn { color: var(--warning); }
.path-hint-err  { color: var(--failed); }

/* env action buttons */
.env-action-btn { padding: 3px 9px; font-size: .78em; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 5px; color: var(--text); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.env-action-btn:hover { background: rgba(255,255,255,.1); }
.env-remove-btn { background: rgba(243,139,168,.07); border-color: rgba(243,139,168,.2); color: var(--failed); }
.env-remove-btn:hover { background: rgba(243,139,168,.18); }

/* ExecStart warning */
.exec-warn { font-size: .78em; color: var(--muted); padding: 1px 0; }

/* create panel */
#create-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#create-header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; }
#create-title { font-size: 1.2em; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
#create-name-row { display: flex; align-items: center; gap: 10px; }
#create-name-row label { color: var(--muted); font-size: .85em; white-space: nowrap; }
#create-name { width: 220px; background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: .9em; font-family: monospace; }
#create-name:focus { outline: none; border-color: var(--accent); }
#create-type { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; color: var(--text); font-size: .88em; cursor: pointer; }
#create-type:focus { outline: none; border-color: var(--accent); }
#create-type option { background: var(--panel2); color: var(--text); }
#create-scroll { flex: 1; overflow-y: auto; padding: 16px 20px 0; }
#create-footer { display: flex; align-items: center; gap: 8px; padding: 11px 20px; border-top: 1px solid var(--border); background: var(--panel); flex-shrink: 0; flex-wrap: wrap; }
#create-status { font-size: .84em; }
#create-status.err { color: var(--failed); }
#create-status.ok  { color: var(--active); }

/* login screen */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
#login-box { background: var(--panel2); border: 1px solid var(--border); border-radius: 12px; padding: 36px 40px; width: 320px; display: flex; flex-direction: column; gap: 16px; }
#login-box h2 { color: var(--accent); font-size: 1.2em; font-weight: 700; text-align: center; margin-bottom: 4px; }
.login-field { display: flex; flex-direction: column; gap: 5px; }
.login-field label { font-size: .8em; color: var(--muted); }
.login-field input { background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 6px; padding: 8px 11px; color: var(--text); font-size: .92em; }
.login-field input:focus { outline: none; border-color: var(--accent); }
#login-btn { padding: 9px; background: rgba(76,201,240,.18); border: 1px solid rgba(76,201,240,.4); border-radius: 7px; color: var(--accent); font-size: .95em; font-weight: 600; cursor: pointer; margin-top: 4px; }
#login-btn:hover { background: rgba(76,201,240,.28); }
#login-error { font-size: .82em; color: var(--failed); text-align: center; min-height: 1.2em; }

/* buttons */
button { cursor: pointer; border-radius: 6px; font-size: .85em; }
.btn         { padding: 6px 13px; background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--text); }
.btn:hover   { background: rgba(255,255,255,.1); }
.btn.primary { background: rgba(76,201,240,.14); border-color: rgba(76,201,240,.4); color: var(--accent); }
.btn.primary:hover { background: rgba(76,201,240,.24); }
.btn.danger  { background: rgba(243,139,168,.1); border-color: rgba(243,139,168,.35); color: var(--failed); }
.btn.danger:hover  { background: rgba(243,139,168,.2); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

#status-bar { font-size: .82em; color: var(--muted); margin-left: 12px; max-width: 340px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#status-bar.ok  { color: var(--active); }
#status-bar.err { color: var(--failed); }
#search { flex: 1; max-width: 260px; background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 6px; padding: 6px 11px; color: var(--text); font-size: .88em; }
#search:focus { outline: none; border-color: var(--accent); }
#search::placeholder { color: var(--muted); }
#fav-toggle { padding: 5px 11px; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: .85em; white-space: nowrap; }
#fav-toggle:hover, #fav-toggle.on { color: var(--star); border-color: var(--star); }
#fav-toggle.on { background: rgba(249,226,175,.08); }
#svc-count { color: var(--muted); font-size: .82em; white-space: nowrap; }
.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<!-- login screen — hidden after successful auth -->
<div id="login-screen" hidden>
  <div id="login-box">
    <h2>sysd_ui</h2>
    <div class="login-field">
      <label>Username</label>
      <input id="login-user" type="text" autocomplete="username" placeholder="admin">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button id="login-btn" onclick="submitLogin()">Sign in</button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <span class="logo">sysd_ui</span>
    <input id="search" placeholder="Filter services…" autocomplete="off" oninput="filterList()">
    <button id="fav-toggle" onclick="toggleFavFilter()">☆ Favorites</button>
    <span id="svc-count"></span>
    <button class="btn" id="daemon-reload-btn" onclick="daemonReload(this)" style="margin-left:auto">Daemon reload</button>
    <span id="status-bar"></span>
    <button class="btn" onclick="doLogout()" title="Sign out" style="color:var(--muted)">Sign out</button>
  </header>

  <div id="layout">
    <aside id="sidebar">
      <div id="sidebar-controls">
        <div id="class-filter">
          <button class="chip active" data-class="all"    onclick="setClassFilter(this)">All</button>
          <button class="chip"        data-class="custom" onclick="setClassFilter(this)">Custom</button>
          <button class="chip"        data-class="app"    onclick="setClassFilter(this)">App</button>
          <button class="chip"        data-class="system" onclick="setClassFilter(this)">System</button>
          <button class="chip"        data-class="core"   onclick="setClassFilter(this)">Core</button>
        </div>
        <button id="new-btn" onclick="openCreateModal()">+ New unit</button>
      </div>
      <ul id="svc-list"></ul>
    </aside>

    <main id="detail">
      <div id="empty-state">Select a service</div>

      <!-- inline create panel — shown instead of detail-content when creating a new unit -->
      <div id="create-content" hidden>
        <div id="create-header">
          <div id="create-title">New unit</div>
          <div id="create-name-row">
            <label>Type</label>
            <select id="create-type" onchange="onCreateTypeChange()">
              <option value=".service">Service</option>
              <option value=".timer">Timer</option>
              <option value=".socket">Socket</option>
              <option value=".path">Path</option>
              <option value=".mount">Mount</option>
              <option value=".automount">Automount</option>
              <option value=".swap">Swap</option>
              <option value=".slice">Slice</option>
            </select>
            <label>Name</label>
            <input id="create-name" placeholder="myservice" autocomplete="off" oninput="onCreateNameChange()">
            <span id="create-name-preview" style="color:var(--muted);font-size:.85em;font-family:monospace;white-space:nowrap"></span>
          </div>
        </div>
        <div id="create-scroll">
          <div id="create-form-sections"></div>
        </div>
        <div id="create-footer">
          <button class="btn primary" onclick="submitCreate()">Create</button>
          <button class="btn" onclick="closeCreatePanel()">Cancel</button>
          <span id="create-status"></span>
        </div>
      </div>

      <div id="detail-content" hidden>
        <div id="detail-header">
          <div>
            <div id="d-name"></div>
            <div id="d-desc"></div>
          </div>
          <span id="d-status" class="badge"></span>
        </div>
        <div id="d-actions"></div>
        <div id="tabs">
          <button class="tab active" data-tab="info"    onclick="switchTab(this)">Info</button>
          <button class="tab"        data-tab="journal" onclick="switchTab(this)">Journal</button>
          <button class="tab"        data-tab="editor"  onclick="switchTab(this)">Editor</button>
        </div>
        <div id="tab-panels">
          <div id="panel-info" class="panel active">
            <table id="d-meta"></table>
            <div id="d-deps"></div>
          </div>
          <div id="panel-journal" class="panel">
            <ul id="d-journal"></ul>
          </div>
          <div id="panel-editor" class="panel">
            <div id="editor-scroll">
              <div id="d-required-by" hidden></div>
              <div id="d-editor"></div>
            </div>
            <div id="editor-footer">
              <button class="btn primary" id="save-btn"    onclick="doSave()">Save override</button>
              <button class="btn"         id="backup-btn"  onclick="doBackup()">Backup</button>
              <button class="btn danger"  id="restore-btn" onclick="doRestore()">Restore backup</button>
              <button class="btn"         id="reload-btn"  onclick="reloadFromDisk()">Reload from disk</button>
              <span id="save-status"></span>
              <span id="editor-state"></span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/static/app.js" defer></script>
</body>
</html>
